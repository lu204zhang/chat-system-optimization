server.port=8082

chat.rabbitmq.host=172.31.59.239
chat.rabbitmq.port=5672
chat.rabbitmq.username=chatuser
chat.rabbitmq.password=chatpassword
chat.rabbitmq.managementPort=15672

# Fix 4: Dynamic scaling configuration
# Starting / minimum worker threads
chat.consumer.minWorkers=5
# Hard upper limit for scale-up
chat.consumer.maxWorkers=40
# Scale UP  when total queue depth exceeds this value
chat.consumer.scaleUpThreshold=500
# Scale DOWN when total queue depth falls below this value
chat.consumer.scaleDownThreshold=50
# How often (ms) the scaler checks queue depth
chat.consumer.scaleIntervalMs=5000

# Per-worker prefetch (back-pressure)
chat.consumer.prefetch=50

# =============================================================================
# Part 2: Write-behind batch persistence
# =============================================================================
# In-memory buffer capacity (messages); drop-on-full if consumers outpace writers
chat.db.bufferCapacity=500000

# Number of dedicated database writer threads (separate pool from consumer threads)
chat.db.writerThreads=4

# Batch size: drain up to N messages per write call
# Tested values: 100, 500, 1000, 5000 — 1000 chosen as optimal (see report)
chat.db.batchSize=1000

# Flush interval: writer waits up to N ms for a full batch before flushing partial
# Tested values: 100ms, 500ms, 1000ms — 500ms chosen as optimal
chat.db.flushIntervalMs=500

# Max retry attempts on PostgreSQL write failure (exponential back-off: 100ms→200ms→400ms)
chat.db.maxRetries=3

# =============================================================================
# Part 3: DB circuit breaker (System Resilience - Option 1)
# =============================================================================
# Open circuit after this many consecutive batch-write failures
chat.db.circuitBreaker.failureThreshold=5
# Stay open for this many ms before attempting a half-open trial
chat.db.circuitBreaker.cooldownMillis=30000

# =============================================================================
# Part 3: Statistics aggregator refresh interval (ms)
# =============================================================================
chat.db.statsRefreshIntervalMs=30000

# =============================================================================
# Part 1: PostgreSQL 15 persistence
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/chatflow
spring.datasource.username=chatuser
spring.datasource.password=chatpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.pool-name=ChatflowPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
