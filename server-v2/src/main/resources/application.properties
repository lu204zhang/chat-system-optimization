server.port=8081

# RabbitMQ connection settings
chat.rabbitmq.host=localhost
chat.rabbitmq.port=5672
chat.rabbitmq.username=guest
chat.rabbitmq.password=guest
chat.rabbitmq.exchange=chat.exchange
chat.rabbitmq.channelPoolSize=16

chat.serverId=server-v2

# Fix 1: Queue TTL (ms) and max-length per room queue
chat.queue.ttlMillis=300000
chat.queue.maxLength=10000

# Fix 3: Circuit breaker tuning
# Open circuit after this many consecutive failures
chat.circuitBreaker.failureThreshold=3
# Stay open for this many ms before attempting a half-open trial
chat.circuitBreaker.cooldownMillis=10000
